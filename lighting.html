<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighting | Elegant Home</title>
    <link
        href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap\"
        rel=\"stylesheet\">
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --dark-brown: #2C1B18;
            --gold: #C5A059;
            --off-white: #F9F7F2;
            --deep-shadow: rgba(0, 0, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --muted-text: #B0A8A6;
            --dark-espresso: #5c4b41;
            --navbar-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f6f1ef;
            color: var(--off-white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        body.rtl {
            direction: rtl;
        }

        /* Circular Gold Frame Navbar */
        header {
            background: var(--luxury-beige);
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 100;
        }

        .nav-container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .nav-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #B8A07A;
            padding: 0;
            object-fit: contain;
            background-color: white;
            display: block;
        }

        .brand-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--dark-brown);
            line-height: 0.9;
            margin: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 25px;
            margin: 0;
        }

        .nav-item {
            text-decoration: none;
            color: var(--dark-espresso);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #B8A07A;
        }

        /* Gold Pill Button */
        .lang-switch {
            background: var(--dark-brown);
            color: var(--off-white);
            border: 1px solid var(--dark-brown);
            padding: 10px 24px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-switch:hover {
            background: transparent;
            color: var(--dark-brown);
        }

        /* --- MOBILE MENU TOGGLE COMPONENT GRAPHIC --- */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--dark-espresso);
            position: relative;
            transition: background 0.3s ease;
        }

        .hamburger-icon::before,
        .hamburger-icon::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 3px;
            background: var(--dark-espresso);
            left: 0;
            transition: transform 0.3s ease;
        }

        .hamburger-icon::before {
            top: -8px;
        }

        .hamburger-icon::after {
            bottom: -8px;
        }

        /* RTL Navbar Flow Directions */
        body.rtl .nav-container {
            flex-direction: row;
        }

        body.rtl .nav-links {
            flex-direction: row-reverse;
        }

        /* --- PORTFOLIO GALLERY STYLES --- */
        .tabs-section {
            padding: 60px 10%;
            text-align: center;
        }

        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #D4C5B9;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: var(--gold);
            color: var(--dark-brown);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        .tab-content.active {
            display: block;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-card {
            background: var(--dark-brown);
            border: 2px solid rgba(197, 160, 89, 0.8);
            padding: 10px;
            border-radius: 5px;
            transition: 0.3s;
            cursor: pointer;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .gallery-img {
            width: 100%;
            height: 260px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 3px;
        }

        /* --- SWIPER LIGHTBOX MODAL GALLERY --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 10, 9, 0.95);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .close-lightbox {
            position: absolute;
            top: 25px;
            right: 30px;
            background: none;
            border: none;
            color: var(--gold);
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 2100;
            transition: transform 0.3s;
        }

        .close-lightbox:hover {
            transform: scale(1.1);
        }

        body.rtl .close-lightbox {
            right: auto;
            left: 30px;
        }

        .swiper-container-wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 40px 0;
            position: relative;
        }

        .swiper {
            width: 100%;
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 320px;
            height: 420px;
            border: 3px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            background-color: var(--dark-brown);
        }

        /* Custom styling for Swiper elements to match palette */
        .swiper-button-next,
        .swiper-button-prev {
            color: var(--gold) !important;
        }

        .swiper-pagination-bullet-active {
            background: var(--gold) !important;
        }

        /* Scroll to Top Button Styling */
        #scrollToTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 50px;
            height: 50px;
            background-color: var(--dark-brown, #2C1B18);
            color: var(--gold, #C5A059);
            border: 2px solid var(--gold, #C5A059);
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);

            /* Animation States */
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s ease, background-color 0.3s ease, color 0.3s ease;
        }

        /* Show State triggered by JavaScript */
        #scrollToTopBtn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Elegant Hover Transition effect */
        #scrollToTopBtn:hover {
            background-color: var(--gold, #C5A059);
            color: var(--dark-brown, #2C1B18);
            box-shadow: 0 6px 20px rgba(197, 160, 89, 0.4);
        }

        /* Dynamic Adjustments for RTL/Arabic layout structure */
        body.rtl #scrollToTopBtn {
            right: auto;
            left: 30px;
        }


        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- MOBILE RESPONSIVE MEDIA BREAKPOINTS --- */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 20px;
            }

            .brand-text h2 {
                font-size: 1.3rem;
            }

            .nav-logo {
                width: 45px;
                height: 45px;
            }

            .menu-toggle {
                display: block;
                z-index: 110;
            }

            /* Stack vertical dropdown menu container */
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--luxury-beige);
                padding: 30px 20px;
                gap: 20px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                border-top: 1px solid rgba(0, 0, 0, 0.05);
                text-align: center;
                z-index: 99;
            }

            .nav-links.active {
                display: flex;
            }

            /* Forces Arabic vertical stack inside the dropdown exactly like English */
            body.rtl .nav-links.active {
                flex-direction: column;
            }

            .nav-item {
                font-size: 1rem;
                display: block;
                padding: 5px 0;
            }

            .lang-switch {
                width: 100%;
                max-width: 200px;
                margin: 5px auto 0 auto;
            }

            /* Main Content Adjustments */
            .tabs-section {
                padding: 40px 20px;
            }

            .tab-buttons {
                gap: 10px;
                margin-bottom: 30px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
                letter-spacing: 1px;
                flex: 1 1 calc(50% - 10px);
                min-width: 130px;
            }

            /* Adaptive Grid Scaling */
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }

            .gallery-card {
                padding: 6px;
            }

            .gallery-img {
                height: 160px;
            }

            .swiper-slide {
                width: 240px;
                height: 320px;
            }

            #scrollToTopBtn {
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
                font-size: 1.25rem;
            }

            body.rtl #scrollToTopBtn {
                right: auto;
                left: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="nav-container">
            <div class="brand">
                <img src="logo.png" alt="Logo" class="nav-logo">
                <div class="brand-text">
                    <h2 id="brand-name">Elegant</h2>
                    <h2 id="brand-sub">Home</h2>
                </div>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                <span class="hamburger-icon"></span>
            </button>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" id="nav-home" class="nav-item">HOME</a></li>
                <li><a href="finishing.html" id="nav-finishing" class="nav-item">FINISHING</a></li>

                <li class="dropdown">
                    <a href="supplies&trading.html" id="nav-supplies" class="nav-item">SUPPLIES & TRADING
                        <small>▾</small></a>
                    <div class="dropdown-content">
                        <a href="supplies&trading.html#sanshe" id="sub-san">Sanshe Sharm</a>
                        <a href="supplies&trading.html#osa" id="sub-osa">Osa</a>
                        <a href="supplies&trading.html#sharm" id="sub-sha">Sharm Electrical</a>
                        <a href="supplies&trading.html#venus" id="sub-ven">Venus</a>
                    </div>
                </li>

                <li class="dropdown">
                    <a href="lighting.html" id="nav-lighting" class="nav-item">LIGHTING <small>▾</small></a>
                    <div class="dropdown-content">
                        <a href="lighting.html#LED" id="sub-led">LED Lighting</a>
                        <a href="lighting.html#Indor" id="sub-indor">Indor Lighting</a>
                        <a href="lighting.html#Outdor" id="sub-outdor">Outdor Lighting</a>
                    </div>
                </li>

                <li class="dropdown">
                    <a href="components.html" id="nav-components" class="nav-item">COMPONENTS <small>▾</small></a>
                    <div class="dropdown-content">
                        <a href="components.html#Electrical" id="sub-elec">Electrical</a>
                        <a href="components.html#Exhaust Fans" id="sub-fans">Exhaust Fans</a>
                    </div>
                </li>

                <li><button class="lang-switch" id="langBtn">EN / AR</button></li>
            </ul>
        </nav>
    </header>

    <main class="tabs-section">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="openTab(event, 'led')" data-en="LED LIGHTING"
                data-ar="إضاءة LED">LED LIGHTING</button>
            <button class="tab-btn" onclick="openTab(event, 'indoor')" data-en="INDOOR LIGHTING"
                data-ar="إضاءة داخلية">INDOOR LIGHTING</button>
            <button class="tab-btn" onclick="openTab(event, 'outdoor')" data-en="OUTDOOR LIGHTING"
                data-ar="إضاءة خارجية">OUTDOOR LIGHTING</button>
        </div>

        <div id="tab-led" class="tab-content active">
            <div class="gallery-grid" id="grid-led"></div>
        </div>
        <div id="tab-indoor" class="tab-content">
            <div class="gallery-grid" id="grid-indoor"></div>
        </div>
        <div id="tab-outdoor" class="tab-content">
            <div class="gallery-grid" id="grid-outdoor"></div>
        </div>
    </main>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <button class="close-lightbox" id="closeLightbox">&times;</button>
        <div class="swiper-container-wrapper">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="swiperWrapper">
                </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </div>
    </div>

    <button id="scrollToTopBtn" aria-label="Scroll to top" title="Go to top">✦</button>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // Array to hold current context's structural elements
        let currentGalleryData = [];

        function openTab(evt, id) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active'));
            evt.currentTarget.classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
        }

        function generateGallery(containerId, folder, prefix, limit) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            for (let i = 1; i <= limit; i++) {
                const imgUrl = `${folder}/${prefix}${i}.jpeg`;

                const card = document.createElement('div');
                card.className = 'gallery-card';

                // Track details to build the dynamic slider safely
                card.setAttribute('data-index', i - 1);
                card.setAttribute('data-folder', folder);
                card.setAttribute('data-prefix', prefix);
                card.setAttribute('data-limit', limit);

                const img = document.createElement('div');
                img.className = 'gallery-img';
                img.style.backgroundImage = `url('${imgUrl}')`;
                card.appendChild(img);
                grid.appendChild(card);

                // Add Click Event Listener for individual cards to launch Swiper Slider
                card.addEventListener('click', function () {
                    const clickedIndex = parseInt(this.getAttribute('data-index'));
                    const currentFolder = this.getAttribute('data-folder');
                    const currentPrefix = this.getAttribute('data-prefix');
                    const currentLimit = parseInt(this.getAttribute('data-limit'));

                    openLightboxSlider(clickedIndex, currentFolder, currentPrefix, currentLimit);
                });
            }
        }

        // Initialize images matching your limits and extension types
        generateGallery('grid-led', 'LEDLight', 'led', 26);
        generateGallery('grid-indoor', 'IndoorLight', 'indor', 36);
        generateGallery('grid-outdoor', 'OutdoorLight', 'outdor', 14);

        // --- SWIPER LIGHTBOX CONTROLLER LOGIC ---
        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const swiperWrapper = document.getElementById('swiperWrapper');
        const closeLightbox = document.getElementById('closeLightbox');
        let swiperInstance = null;

        function openLightboxSlider(activeIndex, folder, prefix, limit) {
            // Clear prior slides cleanly
            swiperWrapper.innerHTML = '';

            // Inject the dynamic subset list mirroring clicked tab category bounds
            for (let i = 1; i <= limit; i++) {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.style.backgroundImage = `url('${folder}/${prefix}${i}.jpeg')`;
                swiperWrapper.appendChild(slide);
            }

            // Show container overlay nicely
            lightboxOverlay.classList.add('active');

            // Initialize or update Swiper layout matching the exact parameters seen in the video
            if (swiperInstance) {
                swiperInstance.destroy(true, true);
            }

            swiperInstance = new Swiper('.mySwiper', {
                effect: 'coverflow',
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: 'auto',
                initialSlide: activeIndex,
                coverflowEffect: {
                    rotate: 0,
                    stretch: 0,
                    depth: 100,
                    modifier: 2.5,
                    slideShadows: true,
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                },
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev',
                },
            });
        }

        // Close functions
        closeLightbox.addEventListener('click', () => {
            lightboxOverlay.classList.remove('active');
        });

        lightboxOverlay.addEventListener('click', (e) => {
            if (e.target === lightboxOverlay) {
                lightboxOverlay.classList.remove('active');
            }
        });

        // Lang Switch Logic precisely styled like supplies&trading.html
        const langBtn = document.getElementById('langBtn');
        let currentLang = 'en';

        langBtn.addEventListener('click', () => {
            currentLang = (currentLang === 'en') ? 'ar' : 'en';
            document.body.classList.toggle('rtl', currentLang === 'ar');
            langBtn.textContent = (currentLang === 'en') ? 'AR' : 'EN';

            if (currentLang === 'ar') {
                document.getElementById('brand-name').textContent = "الجينت";
                document.getElementById('brand-sub').textContent = "هوم";
                document.getElementById('nav-home').textContent = "الرئيسية";
                document.getElementById('nav-supplies').textContent = " توريدات وتجارة ";
                document.getElementById('sub-san').textContent = "سانشي";
                document.getElementById('sub-osa').textContent = "أوسا";
                document.getElementById('sub-sha').textContent = "شرم";
                document.getElementById('sub-ven').textContent = "فينوس";
                document.getElementById('nav-lighting').textContent = "الإضاءة";
                document.getElementById('sub-led').textContent = "LED إضاءه";
                document.getElementById('sub-indor').textContent = "إضاءه داخلية";
                document.getElementById('sub-outdor').textContent = "إضاءه خارجية";
                document.getElementById('nav-finishing').textContent = "تشطيبات";
                document.getElementById('nav-components').textContent = "مشتمالات";
                document.getElementById('sub-elec').textContent = "أدوات كهربائية";
                document.getElementById('sub-fans').textContent = "مراوح شفط";

            } else {
                document.getElementById('brand-name').textContent = "Elegant";
                document.getElementById('brand-sub').textContent = "Home";
                document.getElementById('nav-home').textContent = "Home";
                document.getElementById('nav-supplies').textContent = "SUPPLIES & TRADING";
                document.getElementById('sub-san').textContent = "Sanshe Sharm";
                document.getElementById('sub-osa').textContent = "Osa";
                document.getElementById('sub-sha').textContent = "Sharm Electrical";
                document.getElementById('sub-ven').textContent = "Venus";
                document.getElementById('nav-lighting').textContent = "LIGHTING";
                document.getElementById('sub-led').textContent = "LED Lighting";
                document.getElementById('sub-indor').textContent = "Indor Lighting";
                document.getElementById('sub-outdor').textContent = "Outdor Lighting";
                document.getElementById('nav-finishing').textContent = "FINISHING";
                document.getElementById('nav-components').textContent = "COMPONENTS";
                document.getElementById('sub-elec').textContent = "Electrical";
                document.getElementById('sub-fans').textContent = "Exhaust Fans";
            }

            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = currentLang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-ar');
            });
        });

        document.addEventListener("DOMContentLoaded", function () {
            const scrollBtn = document.getElementById("scrollToTopBtn");
            const menuToggle = document.getElementById("menuToggle");
            const navLinks = document.getElementById("navLinks");

            // Unified mobile menu event listener for both languages
            menuToggle.addEventListener("click", function (e) {
                e.stopPropagation();
                navLinks.classList.toggle("active");
            });

            // Close layout drawer symmetrically if user clicks outside context bounds
            document.addEventListener("click", function (e) {
                if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                    navLinks.classList.remove("active");
                }
            });

            // Monitor window scroll coordinates to reveal or conceal button
            window.addEventListener("scroll", function () {
                if (window.pageYOffset > 300) {
                    scrollBtn.classList.add("show");
                } else {
                    scrollBtn.classList.remove("show");
                }
            });

            // Smooth linear animation scroll interaction
            scrollBtn.addEventListener("click", function () {
                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });
            });
        });
    </script>
</body>

</html>
