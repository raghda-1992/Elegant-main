<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finishing Portfolio | Elegant Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --dark-brown: #2C1B18;
            --gold: #C5A059;
            --off-white: #F9F7F2;
            --muted-text: #B0A8A6;
            --overlay: rgba(24, 14, 12, 0.95);
            --dark-espresso: #5c4b41;
            --navbar-white: #ffffff;
            --card-shadow: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-brown);
            color: var(--off-white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            background: #D4C5B9;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 100;
        }

        .nav-container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .nav-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #B8A07A;
            object-fit: contain;
            background-color: white;
        }

        .brand-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--dark-brown);
            line-height: 0.9;
            margin: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 30px;
        }

        .nav-item {
            text-decoration: none;
            color: var(--dark-espresso);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #B8A07A;
        }

        .lang-switch {
            background: var(--dark-brown);
            color: var(--off-white);
            border: 1px solid var(--dark-brown);
            padding: 10px 24px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* --- SECTION HEADER --- */
        .section-header {
            max-width: 1250px;
            margin: 60px auto 20px;
            padding: 0 30px;
            text-align: center;
        }

        .section-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #D4C5B9;
            margin-bottom: 15px;
        }

        /* --- VIDEO INSPIRED 3D COVERFLOW SLIDER --- */
        .carousel-viewport {
            width: 100%;
            height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            padding: 40px 0;
        }

        .carousel-container {
            position: relative;
            width: 280px;
            height: 380px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .carousel-item {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px var(--card-shadow);
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s ease;
            cursor: pointer;
            backface-visibility: hidden;
        }

        .carousel-item.active {
            border: 4px solid var(--gold);
            filter: brightness(1.1);
            box-shadow: 0 20px 45px rgba(197, 160, 89, 0.35);
        }

        /* --- CAROUSEL PAGINATION DOTS --- */
        .carousel-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0 40px 0;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--gold);
            transform: scale(1.3);
            box-shadow: 0 0 10px var(--gold);
        }

        /* --- LIGHTBOX MODAL --- */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 8, 7, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 85%;
            border: 3px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .lightbox-modal.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: var(--off-white);
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 1001;
        }

        /* --- PROCESS VIDEOS --- */
        .video-section {
            max-width: 1200px;
            margin: 0 auto 80px auto;
            padding: 0 20px;
        }

        .video-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-top: 40px;
        }

        .video-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .video-box video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .video-box h3 {
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }

        /* --- MENU TOGGLE GRAPHIC FALLBACK --- */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--dark-espresso);
            position: relative;
            transition: background 0.3s ease;
        }

        .hamburger-icon::before,
        .hamburger-icon::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 3px;
            background: var(--dark-espresso);
            left: 0;
            transition: transform 0.3s ease;
        }

        .hamburger-icon::before {
            top: -8px;
        }

        .hamburger-icon::after {
            bottom: -8px;
        }

        /* RTL Navbar Flow Directions */
        body.rtl .nav-container {
            flex-direction: row-reverse;
        }

        body.rtl .nav-links {
            flex-direction: row;
        }

        body.rtl .brand {
            flex-direction: row-reverse;
        }



        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 20px;
            }

            .brand-text h2 {
                font-size: 1.3rem;
            }

            .nav-logo {
                width: 45px;
                height: 45px;
            }

            .menu-toggle {
                display: block;
                z-index: 110;
            }

            /* Transformed dropdown overlay design for mobile screen contexts */
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #D4C5B9;
                padding: 30px 20px;
                gap: 20px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                border-top: 1px solid rgba(0, 0, 0, 0.05);
                text-align: center;
                z-index: 99;
            }

            .nav-links.active {
                display: flex;
            }

            /* Ensures that even in RTL mode, the mobile navbar items flow vertically under each other */
            body.rtl .nav-links.active {
                flex-direction: column;
            }

            .nav-item {
                font-size: 1rem;
                display: block;
                padding: 5px 0;
            }

            .lang-switch {
                width: 100%;
                max-width: 200px;
                margin: 5px auto 0 auto;
            }

            .section-header {
                margin: 35px auto 15px;
                padding: 0 20px;
            }

            .section-header h1 {
                font-size: 2rem;
            }

            /* Optimized 3D Coverflow Container Dimensions for smaller viewport scales */
            .carousel-viewport {
                height: 340px;
                padding: 20px 0;
            }

            .carousel-container {
                width: 170px;
                height: 240px;
            }

            .video-container {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .lightbox-close {
                top: 20px;
                right: 20px;
                font-size: 2rem;
            }
        }

        /* --- SCROLL TO TOP --- */
        #scrollToTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 50px;
            height: 50px;
            background-color: var(--dark-brown);
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #scrollToTopBtn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #scrollToTopBtn:hover {
            background-color: var(--gold);
            color: var(--dark-brown);
        }

        body.rtl #scrollToTopBtn {
            right: auto;
            left: 30px;
        }

        @media (max-width: 768px) {
            #scrollToTopBtn {
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
                font-size: 1.25rem;
            }

            body.rtl #scrollToTopBtn {
                right: auto;
                left: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="nav-container">
            <div class="brand">
                <img src="logo.png" alt="Logo" class="nav-logo">
                <div class="brand-text">
                    <h2 id="brand-name">Elegant</h2>
                    <h2 id="brand-sub">Home</h2>
                </div>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                <span class="hamburger-icon"></span>
            </button>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-item" id="nav-home">Home</a></li>
                <li><a href="finishing.html" class="nav-item active" id="nav-finishing">FINISHING</a></li>
                <li><button class="lang-switch" id="langBtn">EN / AR</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section-header">
            <h1 id="page-title">Finishing Portfolio</h1>
        </section>

        <div class="carousel-viewport">
            <div class="carousel-container" id="carouselTrack"></div>
        </div>

        <div class="carousel-dots" id="carouselDots"></div>

        <section class="video-section">
            <div class="section-header">
                <h1 id="process-title">Process & Craftsmanship</h1>
            </div>
            <div class="video-container">
                <div class="video-box">
                    <video src="Finish/Videos/video1.mp4" controls muted></video>
                    <h3 id="v1-t">First-Stage Grid Wiring</h3>
                </div>
                <div class="video-box">
                    <video src="Finish/Videos/video2.mp4" controls muted></video>
                    <h3 id="v2-t">Premium Foundations</h3>
                </div>
                <div class="video-box">
                    <video src="Finish/Videos/video3.mp4" controls muted></video>
                    <h3 id="v3-t">Precision Drywall Geometry</h3>
                </div>
                <div class="video-box">
                    <video src="Finish/Videos/video4.mp4" controls muted></video>
                    <h3 id="v4-t">Final Surface Execution</h3>
                </div>
                <div class="video-box">
                    <video src="Finish/Videos/video5.mp4" controls muted></video>
                    <h3 id="v5-t">Premium Woodwork Installation</h3>
                </div>
            </div>
        </section>
    </main>

    <div class="lightbox-modal" id="lightboxModal">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img src="" alt="Enlarged Showcase View" class="lightbox-content" id="lightboxImg">
    </div>

    <button id="scrollToTopBtn" aria-label="Scroll to top" title="Go to top">✦</button>

    <script>
        const totalImages = 47;
        let currentIndex = 0;
        const carouselTrack = document.getElementById('carouselTrack');
        const carouselDotsContainer = document.getElementById('carouselDots');
        let autoCycleTimer;

        function setupCarousel() {
            for (let i = 1; i <= totalImages; i++) {
                const item = document.createElement('div');
                item.className = 'carousel-item';
                item.style.backgroundImage = `url('Finish/Img/img${i}.jpeg')`;
                item.setAttribute('data-index', i - 1);

                item.addEventListener('click', () => {
                    const idx = parseInt(item.getAttribute('data-index'));
                    if (idx === currentIndex) {
                        openLightbox(`Finish/Img/img${i}.jpeg`);
                    } else {
                        currentIndex = idx;
                        updateCarouselLayout();
                        resetAutoplay();
                    }
                });

                carouselTrack.appendChild(item);

                const dot = document.createElement('div');
                dot.className = `dot ${i === 1 ? 'active' : ''}`;
                dot.setAttribute('data-index', i - 1);
                dot.addEventListener('click', () => {
                    currentIndex = i - 1;
                    updateCarouselLayout();
                    resetAutoplay();
                });
                carouselDotsContainer.appendChild(dot);
            }
            updateCarouselLayout();
            startAutoplay();
        }

        function updateCarouselLayout() {
            const items = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.dot');
            const isMobile = window.innerWidth <= 768;

            items.forEach((item) => {
                const itemIndex = parseInt(item.getAttribute('data-index'));
                let offset = itemIndex - currentIndex;

                if (offset < -totalImages / 2) offset += totalImages;
                if (offset > totalImages / 2) offset -= totalImages;

                const absOffset = Math.abs(offset);

                if (absOffset > 3) {
                    item.style.opacity = '0';
                    item.style.visibility = 'hidden';
                    return;
                }

                item.style.opacity = '1';
                item.style.visibility = 'visible';

                // Adjusted math vectors to strictly prevent overlapping on narrow mobile display sizes
                const spreadDistance = isMobile ? 75 : 160;
                const depthDistance = isMobile ? 80 : 140;

                const translateX = offset * spreadDistance;
                const translateZ = -absOffset * depthDistance;
                const rotateY = offset * -25;
                const zIndex = 100 - absOffset;

                item.style.transform = `translateX(${translateX}px) translateZ(${translateZ}px) rotateY(${rotateY}deg)`;
                item.style.zIndex = zIndex;

                if (offset === 0) {
                    item.classList.add('active');
                    item.style.filter = 'brightness(1)';
                } else {
                    item.classList.remove('active');
                    item.style.filter = `brightness(${Math.max(0.4, 1 - absOffset * 0.25)})`;
                }
            });

            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentIndex);
            });
        }

        function startAutoplay() {
            autoCycleTimer = setInterval(() => {
                currentIndex = (currentIndex + 1) % totalImages;
                updateCarouselLayout();
            }, 3500);
        }

        function resetAutoplay() {
            clearInterval(autoCycleTimer);
            startAutoplay();
        }

        const lightboxModal = document.getElementById('lightboxModal');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightboxModal.classList.add('active');
            clearInterval(autoCycleTimer);
        }

        function closeLightbox() {
            lightboxModal.classList.remove('active');
            startAutoplay();
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightboxModal.addEventListener('click', () => closeLightbox());

        document.addEventListener("DOMContentLoaded", function () {
            setupCarousel();
            window.addEventListener('resize', updateCarouselLayout);

            const scrollBtn = document.getElementById("scrollToTopBtn");
            const menuToggle = document.getElementById("menuToggle");
            const navLinks = document.getElementById("navLinks");

            menuToggle.addEventListener("click", function (e) {
                e.stopPropagation();
                navLinks.classList.toggle("active");
            });

            document.addEventListener("click", function (e) {
                if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                    navLinks.classList.remove("active");
                }
            });

            window.addEventListener("scroll", function () {
                if (window.pageYOffset > 300) {
                    scrollBtn.classList.add("show");
                } else {
                    scrollBtn.classList.remove("show");
                }
            });

            scrollBtn.addEventListener("click", function () {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });

            // Language Switch Translation Controller
            const langBtn = document.getElementById('langBtn');
            let currentLang = 'en';

            langBtn.addEventListener('click', () => {
                currentLang = (currentLang === 'en') ? 'ar' : 'en';
                document.body.classList.toggle('rtl', currentLang === 'ar');
                langBtn.textContent = (currentLang === 'en') ? 'AR' : 'EN';

                if (currentLang === 'ar') {
                    document.getElementById('brand-name').textContent = "الجينت";
                    document.getElementById('brand-sub').textContent = "هوم";
                    document.getElementById('nav-home').textContent = "الرئيسية";
                    document.getElementById('nav-finishing').textContent = "تشطيبات";
                    document.getElementById('page-title').textContent = "معرض التشطيبات";
                    document.getElementById('process-title').textContent = "خطوات العمل والاحترافية";

                    document.getElementById('v1-t').textContent = "تأسيس شبكات الكهرباء الذكية";
                    document.getElementById('v2-t').textContent = "تأسيس الشبكات الداخلية";
                    document.getElementById('v3-t').textContent = "هندسة الأسقف المعلقة والديكور";
                    document.getElementById('v4-t').textContent = "المراحل النهائية وأعمال الدهانات";
                    document.getElementById('v5-t').textContent = "تركيب الأخشاب والديكورات الراقية";
                } else {
                    document.getElementById('brand-name').textContent = "Elegant";
                    document.getElementById('brand-sub').textContent = "Home";
                    document.getElementById('nav-home').textContent = "Home";
                    document.getElementById('nav-finishing').textContent = "FINISHING";
                    document.getElementById('page-title').textContent = "Finishing Portfolio";
                    document.getElementById('process-title').textContent = "Process & Craftsmanship";

                    document.getElementById('v1-t').textContent = "First-Stage Grid Wiring";
                    document.getElementById('v2-t').textContent = "Premium Foundations";
                    document.getElementById('v3-t').textContent = "Precision Drywall Geometry";
                    document.getElementById('v4-t').textContent = "Final Surface Execution";
                    document.getElementById('v5-t').textContent = "Premium Woodwork Installation";
                }
                updateCarouselLayout();
            });
        });
    </script>
</body>

</html>
